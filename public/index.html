<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeChat Workflow</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <!-- Topbar -->
  <header class="topbar" role="banner">
    <div class="topbar-left">
      <span class="brand-mark">W</span>
      <span id="doc-title" class="doc-title">WeChat Workflow</span>
    </div>
    <div class="topbar-right">
      <button id="btn-publish" class="btn btn-primary" type="button">发布</button>
      <button id="btn-convert" class="btn" type="button">导出</button>
      <button id="btn-settings" class="btn btn-icon" type="button" title="设置">⚙️</button>
      <button id="dark-toggle" class="btn btn-icon" type="button" title="切换主题">🌙</button>
    </div>
  </header>

  <!-- Main layout -->
  <div class="layout">
    <!-- Document tree -->
    <aside class="sidebar" id="doc-tree" aria-label="文档树">
      <!-- Rendered by tree.js -->
    </aside>

    <!-- Editor -->
    <main class="editor-pane" aria-label="编辑器">
      <div class="editor-header">
        <input id="editor-title" class="editor-title-input" type="text" placeholder="无标题" aria-label="文章标题" />
        <div class="editor-meta">
          <span id="editor-status" class="editor-status"></span>
        </div>
      </div>
      <div id="editor-content" class="editor-content" contenteditable="true" spellcheck="false" aria-label="文章内容"></div>
    </main>

    <!-- Floating toolbar -->
    <div id="float-toolbar" class="float-toolbar hidden">
      <button class="ft-btn" data-cmd="bold" title="加粗" onclick="window.WW.editor.execFormat('bold')"><b>B</b></button>
      <button class="ft-btn" data-cmd="italic" title="斜体" onclick="window.WW.editor.execFormat('italic')"><i>I</i></button>
      <button class="ft-btn" data-cmd="createLink" title="链接" onclick="var u=prompt('链接地址:');if(u)window.WW.editor.execFormat('createLink',u)">🔗</button>
      <button class="ft-btn" data-cmd="image" title="AI 配图" onclick="window.WW.editor.insertAIImage()">🖼</button>
      <button class="ft-btn ft-btn-ai" data-cmd="rewrite" title="AI 重写" onclick="window.WW.editor.aiRewrite()">✨ 重写</button>
    </div>

    <!-- AI Assistant Panel -->
    <aside id="ai-panel" class="ai-panel" aria-label="AI 助理">
      <div class="ai-header">
        <span class="ai-title">AI 助理</span>
        <button id="chat-toggle" class="btn btn-icon ai-close" type="button" title="折叠">✕</button>
      </div>
      <div id="chat-messages" class="chat-messages">
        <!-- Rendered by chat.js -->
      </div>
      <div class="chat-input-area">
        <textarea id="chat-input" class="chat-input" rows="2" placeholder="输入消息... /image /polish /research" aria-label="AI 消息"></textarea>
        <button id="chat-send" class="btn btn-primary chat-send" type="button">发送</button>
      </div>
    </aside>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal-backdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
      <header class="modal-head">
        <h2 id="settings-title" class="modal-title">设置</h2>
        <button class="modal-close btn btn-icon" type="button" aria-label="关闭">✕</button>
      </header>
      <div class="modal-body">
        <p style="color:var(--fg-soft);font-size:13px">
          AI 配置请通过环境变量设置：<code>AGNES_API_KEY</code>（文本 + 图像通用）。<br>
          微信配置在 <code>config.json</code> 或环境变量 <code>WECHAT_APP_ID</code>/<code>WECHAT_APP_SECRET</code>。
        </p>
      </div>
    </div>
  </div>

  <!-- Toast root -->
  <div id="toast-root" class="toast-root" aria-live="polite"></div>

  <!-- Scripts -->
  <script src="/api.js"></script>
  <script src="/tree.js"></script>
  <script src="/editor.js"></script>
  <script src="/chat.js"></script>
  <script src="/app.js"></script>
</body>
</html>
