<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeChat Workflow</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar" role="banner">
    <div class="brand">
      <span class="brand-mark">W</span>
      <span class="brand-name">WeChat Workflow</span>
    </div>
    <nav class="workflow-nav" role="tablist" aria-label="写作流程">
      <button class="workflow-step" data-step="topic" type="button" role="tab" aria-selected="false">
        <span class="step-label">选题策划</span>
      </button>
      <span class="workflow-arrow" aria-hidden="true">→</span>
      <button class="workflow-step" data-step="research" type="button" role="tab" aria-selected="false">
        <span class="step-label">资料搜集</span>
      </button>
      <span class="workflow-arrow" aria-hidden="true">→</span>
      <button class="workflow-step is-active" data-step="write" type="button" role="tab" aria-selected="true">
        <span class="step-label">写作编辑</span>
      </button>
      <span class="workflow-arrow" aria-hidden="true">→</span>
      <button class="workflow-step" data-step="format" type="button" role="tab" aria-selected="false">
        <span class="step-label">排版美化</span>
      </button>
      <span class="workflow-arrow" aria-hidden="true">→</span>
      <button class="workflow-step" data-step="preview" type="button" role="tab" aria-selected="false">
        <span class="step-label">预览审核</span>
      </button>
      <span class="workflow-arrow" aria-hidden="true">→</span>
      <button class="workflow-step" data-step="publish" type="button" role="tab" aria-selected="false">
        <span class="step-label">发布</span>
      </button>
      <span class="workflow-arrow" aria-hidden="true">→</span>
      <button class="workflow-step" data-step="stats" type="button" role="tab" aria-selected="false">
        <span class="step-label">数据复盘</span>
      </button>
    </nav>

    <div class="topbar-actions">
      <label class="topbar-field" id="tpl-field" for="template-select">
        <span>模板</span>
        <select id="template-select" aria-label="排版模板"></select>
      </label>
      <span id="step-actions">
        <button id="btn-save" class="btn btn-primary" type="button">保存</button>
        <button id="btn-convert" class="btn" type="button" title="导出 HTML">导出</button>
      </span>
      <div class="overflow-wrap">
        <button id="btn-overflow" class="btn btn-icon" type="button" aria-label="更多操作" title="更多">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <circle cx="12" cy="5" r="2" fill="currentColor"/>
            <circle cx="12" cy="12" r="2" fill="currentColor"/>
            <circle cx="12" cy="19" r="2" fill="currentColor"/>
          </svg>
        </button>
        <div class="overflow-dropdown" id="overflow-dropdown" hidden>
          <button class="overflow-item" id="btn-ov-publish" type="button">🚀 发布</button>
          <button class="overflow-item" id="btn-ov-stats" type="button">📊 数据复盘</button>
          <div class="overflow-sep"></div>
          <button class="overflow-item" id="btn-ov-settings" type="button">⚙️ 设置</button>
        </div>
      </div>
    </div>
  </header>

  <main class="layout" id="view-writing" data-view="writing">
    <aside class="sidebar" aria-label="文章列表">
      <div class="sidebar-head">
        <button id="btn-new-article" class="btn btn-block" type="button">+ 新建文章</button>
        <input id="article-search" class="input" type="search" placeholder="搜索标题/标签" aria-label="搜索文章" />
        <div class="filter-row" role="tablist" aria-label="状态过滤">
          <button class="filter-chip is-active" data-filter="all" type="button" role="tab" aria-selected="true">全部</button>
          <button class="filter-chip" data-filter="draft" type="button" role="tab" aria-selected="false">草稿</button>
          <button class="filter-chip" data-filter="ready" type="button" role="tab" aria-selected="false">已转换</button>
          <button class="filter-chip" data-filter="published" type="button" role="tab" aria-selected="false">已发布</button>
        </div>
      </div>
      <ul id="article-list" class="article-list" role="list" aria-label="文章列表"></ul>
      <div class="sidebar-foot">
        <span id="health-dot" class="status-dot-small"></span>
        <span id="health-text" class="muted">连接中…</span>
        <span class="sidebar-foot-spacer"></span>
        <span id="article-count">0 篇</span>
      </div>
    </aside>

    <section class="editor-pane" aria-label="编辑器">
      <div class="editor-toolbar" role="toolbar" aria-label="编辑工具栏">
        <input id="article-title" class="input input-title" type="text" placeholder="文章标题" aria-label="文章标题" />
        <input id="article-author" class="input" type="text" placeholder="作者" aria-label="作者" />
        <div class="chip-row" role="group" aria-label="Markdown 格式">
          <button class="chip" data-md="bold" type="button" title="加粗 (Ctrl+B)">B</button>
          <button class="chip chip-italic" data-md="italic" type="button" title="斜体 (Ctrl+I)">I</button>
          <button class="chip" data-md="code" type="button" title="行内代码">‹/›</button>
          <button class="chip" data-md="link" type="button" title="链接">🔗</button>
          <button class="chip" data-md="image" type="button" title="图片">🖼</button>
          <button class="chip" data-md="quote" type="button" title="引用">❝</button>
          <button class="chip" data-md="list" type="button" title="无序列表">•</button>
          <button class="chip" data-md="ordered" type="button" title="有序列表">1.</button>
          <button class="chip" data-md="codeblock" type="button" title="代码块">{}</button>
          <span class="chip-sep" aria-hidden="true"></span>
          <button class="chip chip-ai" data-md="cover" type="button" title="AI 生成封面图">🎨 封面</button>
          <button class="chip chip-ai" data-md="inline" type="button" title="AI 生成插图">🖼 插图</button>
          <button class="chip chip-ai" data-md="prompt" type="button" title="结构化提示词面板" id="btn-prompt-settings">🎯 提示词</button>
        </div>
      </div>
      <textarea id="editor" class="editor" spellcheck="false" aria-label="Markdown 内容" placeholder="# 标题&#10;&#10;开始写你的公众号文章…"></textarea>
      <div class="editor-foot">
        <span id="editor-status" class="muted">未选中文章</span>
        <span id="editor-words" class="muted">0 字</span>
      </div>
    </section>

    <section class="preview-pane" aria-label="微信预览">
      <div class="preview-head">
        <span class="preview-title">微信预览</span>
        <span id="preview-template" class="muted">—</span>
      </div>
      <iframe id="preview-frame" class="preview-frame" title="渲染预览" sandbox="allow-same-origin"></iframe>
    </section>
  </main>

  <section class="board" id="view-topics" data-view="topics" hidden aria-label="选题看板">
    <div class="board-head">
      <div class="board-head-left">
        <h2 class="board-title">选题看板</h2>
        <span id="topic-count" class="muted">0 个</span>
        <input id="topic-search" class="input board-search" type="search" placeholder="搜索标题/摘要/来源" aria-label="搜索选题" />
      </div>
      <div class="board-head-right">
        <div class="view-switch" role="tablist" aria-label="视图切换">
          <button class="view-switch-btn is-active" data-board-view="kanban" type="button" role="tab" aria-selected="true">看板</button>
          <button class="view-switch-btn" data-board-view="list" type="button" role="tab" aria-selected="false">列表</button>
        </div>
        <button id="btn-new-topic" class="btn btn-primary" type="button">+ 新建选题</button>
        <button id="btn-refresh-topics" class="btn btn-ghost" type="button" title="刷新选题列表">↻</button>
      </div>
    </div>
    <div class="board-body">
      <div class="kanban" id="kanban-board" role="list" aria-label="看板泳道"></div>
      <div class="topic-list-wrap" id="topic-list-wrap" hidden>
        <table class="topic-list-table" aria-label="选题列表">
          <thead>
            <tr>
              <th>标题</th>
              <th>状态</th>
              <th>优先级</th>
              <th>来源</th>
              <th>关联文章</th>
              <th>更新时间</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="topic-list-body"></tbody>
        </table>
        <div class="topic-list-empty" id="topic-list-empty" hidden>暂无选题，点击右上角「+ 新建选题」开始</div>
      </div>
    </div>
  </section>

  <!-- 排版美化视图 -->
  <section class="view-format" id="view-format" data-view="format" hidden aria-label="排版美化">
    <div class="format-header">
      <h2 class="view-title">排版美化</h2>
      <div class="format-controls">
        <label for="format-template-select">模板：</label>
        <select id="format-template-select" aria-label="排版模板"></select>
      </div>
    </div>
    <div class="format-layout">
      <div class="format-editor-pane">
        <div class="format-editor-header">
          <span class="format-editor-title">Markdown 编辑</span>
        </div>
        <textarea id="format-editor" class="format-editor" spellcheck="false" aria-label="Markdown 内容"></textarea>
      </div>
      <div class="format-preview-pane">
        <div class="format-preview-header">
          <span class="format-preview-title">预览效果</span>
        </div>
        <iframe id="format-preview-frame" class="format-preview-frame" title="排版预览" sandbox="allow-same-origin"></iframe>
      </div>
    </div>
  </section>

  <!-- 预览审核视图 -->
  <section class="view-preview" id="view-preview" data-view="preview" hidden aria-label="预览审核">
    <div class="preview-header">
      <div class="preview-info">
        <h2 class="preview-article-title" id="preview-article-title">未选择文章</h2>
        <span class="preview-meta">
          <span id="preview-template-name">模板：—</span>
          <span id="preview-word-count">字数：0</span>
        </span>
      </div>
    </div>
    <div class="preview-container">
      <div class="preview-device">
        <iframe id="mobile-preview-frame" class="mobile-preview-frame" title="手机预览" sandbox="allow-same-origin"></iframe>
      </div>
    </div>
    <div class="preview-actions">
      <button id="btn-back-to-edit" class="btn" type="button">← 返回编辑</button>
      <button id="btn-confirm-publish" class="btn btn-primary" type="button">确认发布 →</button>
    </div>
  </section>

  <!-- 资料搜集视图 -->
  <section class="view-research" id="view-research" data-view="research" hidden aria-label="资料搜集">
    <div class="research-header">
      <h2 class="view-title">资料搜集</h2>
      <span class="research-article-title" id="research-article-title">未选择文章</span>
    </div>
    <div class="research-content">
      <label for="research-notes" class="research-label">资料笔记（支持 Markdown）</label>
      <textarea id="research-notes" class="research-notes" placeholder="在此记录你的资料搜集笔记...&#10;&#10;支持 Markdown 格式，如：&#10;- 参考资料链接&#10;- 关键数据&#10;- 采访记录" aria-label="资料笔记"></textarea>
    </div>
    <div class="research-actions">
      <button id="btn-save-research" class="btn btn-primary" type="button">💾 保存资料</button>
    </div>
  </section>

  <div id="modal-root" class="modal-root" aria-live="polite"></div>
  <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="false"></div>

  <template id="tpl-modal">
    <div class="modal-backdrop" data-modal>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <header class="modal-head">
          <h2 id="modal-title" class="modal-title">标题</h2>
          <button class="modal-close" data-action="close" type="button" aria-label="关闭">×</button>
        </header>
        <div class="modal-body" data-body></div>
        <footer class="modal-foot" data-foot></footer>
      </div>
    </div>
  </template>

  <script src="/app.js" defer></script>
</body>
</html>
